        .project-section { min-width: 100vw; height: 100vh; flex-shrink: 0; scroll-snap-align: start; overflow-y: scroll; scroll-snap-type: y proximity; cursor: pointer; }

        .horizontal-gallery > img, .horizontal-gallery > video { min-height: 100vh; width: 100vw; flex-shrink: 0; object-fit: cover; user-select: none; pointer-events: none; scroll-snap-align: start; }
        .canvas-frame { position: relative; width: 100vw; height: 100vh; flex-shrink: 0; overflow: hidden; scroll-snap-align: start; background: #000; }
        .canvas-frame.bg-white { background: #fff; }

    <script>
        document.fonts.load('1em Anton').then(() => {
            document.querySelectorAll('.side-menu').forEach(m => m.style.opacity = '1');
        });

        const _c = document.createElement('canvas');
        _c.width = _c.height = 100;
        const _x = _c.getContext('2d');

        function setNavColor(bright) {
            document.querySelectorAll('.side-menu a').forEach(a => a.style.color = bright ? '#000' : '#fff');
            document.querySelectorAll('.circle-btn').forEach(b => b.style.backgroundColor = bright ? '#000' : '#fff');
        }

        function sampleMedia(el, done) {
            const go = () => {
                try {
                    _x.drawImage(el, 0, 0, 100, 100);
                    const d = _x.getImageData(0, 0, 100, 100).data;
                    let s = 0;
                    for (let i = 0; i < d.length; i += 4)
                        s += 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
                    done(s / (d.length / 4) > 128);
                } catch(e) { done(false); }
            };
            if (el.tagName === 'VIDEO') {
                el.readyState >= 2 ? go() : el.addEventListener('loadeddata', go, { once: true });
            } else {
                el.complete && el.naturalWidth ? go() : el.addEventListener('load', go, { once: true });
            }
        }

        function updateNavColor(section) {
            const media = section.querySelectorAll('img, video');
            const idx = Math.min(Math.round(section.scrollTop / window.innerHeight), media.length - 1);
            if (media[idx]) sampleMedia(media[idx], setNavColor);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.vertical-scroll-container').forEach(container => {
                const sections = Array.from(container.querySelectorAll('.project-section'));
                let currentB = 0;

                function goToB(index) {
                    currentB = Math.max(0, Math.min(sections.length - 1, index));
                    container.scrollTo({ left: currentB * window.innerWidth, behavior: 'smooth' });
                    setTimeout(() => updateNavColor(sections[currentB]), 900);
                }

                container.addEventListener('scrollend', () => {
                    currentB = Math.round(container.scrollLeft / window.innerWidth);
                });

                sections.forEach(section => {
                    section.addEventListener('click', function(e) {
                        const goLeft = e.clientX < window.innerWidth / 2;
                        goToB(goLeft ? currentB - 1 : currentB + 1);
                    });

                    let scrollTimer;
                    section.addEventListener('scroll', () => {
                        clearTimeout(scrollTimer);
                        scrollTimer = setTimeout(() => updateNavColor(section), 250);
                    });
                });

                updateNavColor(sections[0]);

                container.closest('.portfolio-wrapper').querySelectorAll('.side-menu a').forEach(link => {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('href').slice(1);
                        const idx = sections.findIndex(s => s.id === targetId);
                        if (idx !== -1) goToB(idx);
                    });
                });
            });
        });

        function switchPortfolio(targetId) {
            document.querySelectorAll('.portfolio-wrapper').forEach(wrapper => wrapper.classList.remove('active'));
            document.querySelectorAll('.circle-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(targetId).classList.add('active');
            document.getElementById('btn-' + targetId).classList.add('active');
        }
    </script>
