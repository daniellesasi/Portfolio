<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chic Portfolio - Real Media</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Anton', sans-serif; overflow: hidden; background-color: #000; letter-spacing: 1px; }
        
        .side-menu { position: fixed; top: 40px; left: 40px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .side-menu a { text-decoration: none; color: white; font-size: 2.1rem; transition: opacity 0.4s ease, transform 0.4s ease; }
        .side-menu a:hover { opacity: 0.6; transform: translateX(10px); }
        
        .portfolio-switcher { position: fixed; bottom: 40px; left: 40px; z-index: 200; display: flex; gap: 15px; }
        .circle-btn { width: 44px; height: 44px; background-color: white; border-radius: 50%; cursor: pointer; opacity: 0.3; transition: transform 0.3s ease, opacity 0.3s ease; }
        .circle-btn:hover { transform: scale(1.1); }
        .circle-btn.active { opacity: 1; }
        
        .portfolio-wrapper { display: none; }
        .portfolio-wrapper.active { display: block; }
        
        .vertical-scroll-container { height: 100vh; width: 100vw; overflow-y: hidden; scroll-behavior: smooth; }
        .project-section { height: 100vh; width: 100vw; position: relative; overflow: hidden; cursor: pointer; }

        .horizontal-gallery { display: flex; height: 100%; width: 100%; transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .horizontal-gallery img, .horizontal-gallery video { min-width: 100vw; height: 100vh; object-fit: cover; user-select: none; pointer-events: none; }
    </style>
</head>
<body>

    <div class="portfolio-switcher">
        <div class="circle-btn active" id="btn-port1" onclick="switchPortfolio('port1')"></div>
        <div class="circle-btn" id="btn-port2" onclick="switchPortfolio('port2')"></div>
    </div>

    <div id="port1" class="portfolio-wrapper active">
        <nav class="side-menu">
            <a href="#a1b1">1</a><a href="#a1b2">2</a><a href="#a1b3">3</a><a href="#a1b4">4</a><a href="#a1b5">5</a><a href="#a1b6">6</a><a href="#a1b7">7</a>
        </nav>

        <main class="vertical-scroll-container">
            <section id="a1b1" class="project-section">
                <div class="horizontal-gallery" data-current-index="0">
                    <video src="a1b1c1.mp4" autoplay loop muted playsinline></video>
                    <img src="a1b1c2.jpg" loading="lazy" alt="P1 G1 Image 2">
                    <img src="a1b1c3.jpg" loading="lazy" alt="P1 G1 Image 3">
                    <video src="a1b1c4.mp4" autoplay loop muted playsinline></video>
                    <img src="a1b1c5.jpg" loading="lazy" alt="P1 G1 Image 5">
                </div>
            </section>
            
            <section id="a1b2" class="project-section">
                <div class="horizontal-gallery" data-current-index="0">
                    <img src="a1b2c1.webp" alt="P1 G2 Image 1">
                    <img src="a1b2c2.webp" loading="lazy" alt="P1 G2 Image 2">
                    <img src="a1b2c3.webp" loading="lazy" alt="P1 G2 Image 3">
                </div>
            </section>

            <section id="a1b3" class="project-section">
                <div class="horizontal-gallery" data-current-index="0">
                    <video src="a1b3c1.mp4" autoplay loop muted playsinline></video>
                    <img src="a1b3c2.webp" loading="lazy" alt="P1 G3 Image 2">
                    <img src="a1b3c3.webp" loading="lazy" alt="P1 G3 Image 3">
                </div>
            </section>

            <section id="a1b4" class="project-section">
                <div class="horizontal-gallery" data-current-index="0">
                    <img src="a1b4c1.webp" alt="P1 G4 Image 1">
                    <img src="a1b4c2.webp" loading="lazy" alt="P1 G4 Image 2">
                    <img src="a1b4c3.webp" loading="lazy" alt="P1 G4 Image 3">
                </div>
            </section>

            <section id="a1b5" class="project-section">
                <div class="horizontal-gallery" data-current-index="0">
                    <img src="a1b5c1.webp" alt="P1 G5 Image 1">
                    <img src="a1b5c2.webp" loading="lazy" alt="P1 G5 Image 2">
                    <img src="a1b5c3.webp" loading="lazy" alt="P1 G5 Image 3">
                </div>
            </section>

            <section id="a1b6" class="project-section">
                <div class="horizontal-gallery" data-current-index="0">
                    <video src="a1b6c1.mp4" autoplay loop muted playsinline></video>
                    <img src="a1b6c2.webp" loading="lazy" alt="P1 G6 Image 2">
                    <img src="a1b6c3.webp" loading="lazy" alt="P1 G6 Image 3">
                </div>
            </section>

            <section id="a1b7" class="project-section">
                <div class="horizontal-gallery" data-current-index="0">
                    <img src="a1b7c1.webp" alt="P1 G7 Image 1">
                    <img src="a1b7c2.webp" loading="lazy" alt="P1 G7 Image 2">
                    <img src="a1b7c3.webp" loading="lazy" alt="P1 G7 Image 3">
                </div>
            </section>
        </main>
    </div>

    <div id="port2" class="portfolio-wrapper">
        <nav class="side-menu">
            <a href="#a2b1">1</a><a href="#a2b2">2</a><a href="#a2b3">3</a><a href="#a2b4">4</a><a href="#a2b5">5</a><a href="#a2b6">6</a><a href="#a2b7">7</a>
        </nav>

        <main class="vertical-scroll-container">
            <section id="a2b1" class="project-section">
                <div class="horizontal-gallery" data-current-index="0"><img src="a2b1c1.webp" alt="P2"><img src="a2b1c2.webp" loading="lazy"><img src="a2b1c3.webp" loading="lazy"></div>
            </section>
            <section id="a2b2" class="project-section">
                <div class="horizontal-gallery" data-current-index="0"><img src="a2b2c1.webp" alt="P2"><img src="a2b2c2.webp" loading="lazy"><img src="a2b2c3.webp" loading="lazy"></div>
            </section>
            <section id="a2b3" class="project-section">
                <div class="horizontal-gallery" data-current-index="0"><img src="a2b3c1.webp" alt="P2"><img src="a2b3c2.webp" loading="lazy"><img src="a2b3c3.webp" loading="lazy"></div>
            </section>
            <section id="a2b4" class="project-section">
                <div class="horizontal-gallery" data-current-index="0"><img src="a2b4c1.webp" alt="P2"><img src="a2b4c2.webp" loading="lazy"><img src="a2b4c3.webp" loading="lazy"></div>
            </section>
            <section id="a2b5" class="project-section">
                <div class="horizontal-gallery" data-current-index="0"><img src="a2b5c1.webp" alt="P2"><img src="a2b5c2.webp" loading="lazy"><img src="a2b5c3.webp" loading="lazy"></div>
            </section>
            <section id="a2b6" class="project-section">
                <div class="horizontal-gallery" data-current-index="0"><img src="a2b6c1.webp" alt="P2"><img src="a2b6c2.webp" loading="lazy"><img src="a2b6c3.webp" loading="lazy"></div>
            </section>
            <section id="a2b7" class="project-section">
                <div class="horizontal-gallery" data-current-index="0"><img src="a2b7c1.webp" alt="P2"><img src="a2b7c2.webp" loading="lazy"><img src="a2b7c3.webp" loading="lazy"></div>
            </section>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.vertical-scroll-container').forEach(container => {
                const sections = Array.from(container.querySelectorAll('.project-section'));
                let currentSection = 0;
                let scrollLock = false;

                function goToSection(index) {
                    currentSection = Math.max(0, Math.min(sections.length - 1, index));
                    container.scrollTo({ top: currentSection * window.innerHeight, behavior: 'smooth' });
                }

                // Click = navigate between b sections
                sections.forEach((section, i) => {
                    section.addEventListener('click', function(e) {
                        const goUp = e.clientY < window.innerHeight / 2;
                        goToSection(goUp ? i - 1 : i + 1);
                    });

                    // Scroll = navigate c slides within section
                    section.addEventListener('wheel', function(e) {
                        e.preventDefault();
                        if (scrollLock) return;
                        scrollLock = true;
                        setTimeout(() => { scrollLock = false; }, 600);
                        const gallery = this.querySelector('.horizontal-gallery');
                        const media = gallery.querySelectorAll('img, video');
                        if (media.length <= 1) return;
                        let idx = parseInt(gallery.getAttribute('data-current-index'));
                        idx = e.deltaY > 0
                            ? (idx + 1) % media.length
                            : (idx - 1 + media.length) % media.length;
                        gallery.setAttribute('data-current-index', idx);
                        gallery.style.transform = `translateX(${idx * -100}vw)`;
                    }, { passive: false });
                });
            });
        });

        function switchPortfolio(targetId) {
            document.querySelectorAll('.portfolio-wrapper').forEach(wrapper => wrapper.classList.remove('active'));
            document.querySelectorAll('.circle-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(targetId).classList.add('active');
            document.getElementById('btn-' + targetId).classList.add('active');
        }
    </script>
</body>
</html>
