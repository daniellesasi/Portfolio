<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0d0d0d; color: #fff; height: 100vh; overflow: hidden; }

  /* ── HEADER ── */
  #header { height: 52px; background: #141414; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; padding: 0 24px; flex-shrink: 0; }
  #header h1 { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: #444; flex: 1; }
  .btn { background: #222; color: #ccc; border: 1px solid #333; padding: 6px 16px; border-radius: 5px; font-size: 0.78rem; cursor: pointer; white-space: nowrap; }
  .btn:hover { background: #2a2a2a; color: #fff; }
  .btn.primary { background: #fff; color: #000; border-color: #fff; font-weight: 600; }
  .btn.primary:hover { background: #e0e0e0; }
  .btn.green { background: #00bb44; color: #000; border-color: #00bb44; font-weight: 600; }
  .btn.green:hover { background: #009933; }
  .btn:disabled { opacity: 0.25; pointer-events: none; }
  input.token-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 6px 12px; border-radius: 5px; font-size: 0.78rem; width: 260px; }
  input.token-input::placeholder { color: #444; }
  #status { font-size: 0.75rem; color: #444; }
  #status.ok { color: #00bb44; }
  #status.err { color: #f44; }

  /* ── MAIN LAYOUT ── */
  #app { display: flex; flex-direction: column; height: calc(100vh - 52px); }

  /* ── GRID VIEW ── */
  #grid-view { flex: 1; overflow-y: auto; padding: 24px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { padding: 6px 18px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; cursor: pointer; font-size: 0.78rem; color: #555; }
  .tab.active { background: #fff; color: #000; border-color: #fff; }

  .sections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .section-card { background: #1a1a1a; border: 1px solid #222; border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
  .section-card:hover { border-color: #555; transform: scale(1.01); }
  .section-card .preview { height: 160px; background: #111; position: relative; overflow: hidden; }
  .section-card .preview img, .section-card .preview video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  .section-card .preview .count-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 10px; font-size: 0.65rem; color: #aaa; }
  .section-card .card-footer { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
  .section-card .card-label { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: #555; }
  .section-card .edit-hint { font-size: 0.68rem; color: #333; }
  .section-card:hover .edit-hint { color: #888; }

  /* ── CANVAS EDITOR (full screen overlay) ── */
  #canvas-editor { position: fixed; inset: 0; background: #0d0d0d; z-index: 100; display: none; flex-direction: column; }
  #canvas-editor.open { display: flex; }

  #canvas-header { height: 52px; background: #141414; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 14px; padding: 0 20px; flex-shrink: 0; }
  #canvas-header .back-btn { font-size: 1.1rem; cursor: pointer; color: #888; padding: 4px 8px; }
  #canvas-header .back-btn:hover { color: #fff; }
  #canvas-header .canvas-title { font-size: 0.72rem; letter-spacing: 3px; text-transform: uppercase; color: #666; flex: 1; }
  #canvas-header .slide-info { font-size: 0.72rem; color: #444; }
  .zoom-display { font-size: 0.72rem; color: #444; min-width: 50px; text-align: right; }

  /* Main canvas area */
  #canvas-area { flex: 1; position: relative; overflow: hidden; cursor: grab; background: #000; }
  #canvas-area.grabbing { cursor: grabbing; }
  #canvas-media-wrap { width: 100%; height: 100%; }
  #canvas-media-wrap img, #canvas-media-wrap video { width: 100%; height: 100%; object-fit: cover; object-position: 50% 50%; transform: scale(1); transform-origin: center; pointer-events: none; display: block; }
  #canvas-empty { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #2a2a2a; }
  #canvas-empty .big-plus { font-size: 3rem; }
  #canvas-empty p { font-size: 0.78rem; letter-spacing: 2px; text-transform: uppercase; }
  #canvas-area.drag-over { background: #1a1a1a; }
  #canvas-area.drag-over #canvas-empty { color: #555; }

  /* Filmstrip */
  #filmstrip-wrap { height: 110px; background: #111; border-top: 1px solid #1e1e1e; display: flex; align-items: center; flex-shrink: 0; overflow: hidden; }
  #filmstrip { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; height: 100%; align-items: center; flex: 1; scroll-behavior: smooth; }
  #filmstrip::-webkit-scrollbar { height: 3px; }
  #filmstrip::-webkit-scrollbar-track { background: #111; }
  #filmstrip::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .thumb { width: 130px; height: 82px; flex-shrink: 0; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid #222; position: relative; background: #1a1a1a; transition: border-color 0.15s; }
  .thumb:hover { border-color: #555; }
  .thumb.active { border-color: #fff; }
  .thumb img, .thumb video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; display: block; }
  .thumb .thumb-del { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.75); border: none; color: #fff; width: 20px; height: 20px; border-radius: 4px; font-size: 0.65rem; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 2; }
  .thumb:hover .thumb-del { display: flex; }
  .thumb .thumb-del:hover { background: rgba(220,40,40,0.85); }
  .thumb .thumb-idx { position: absolute; bottom: 4px; left: 6px; font-size: 0.6rem; color: rgba(255,255,255,0.35); pointer-events: none; }

  .thumb-add { width: 130px; height: 82px; flex-shrink: 0; border-radius: 6px; border: 2px dashed #2a2a2a; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #2a2a2a; font-size: 1.4rem; transition: all 0.15s; }
  .thumb-add:hover { border-color: #555; color: #555; }

  .warn { background: #191200; border: 1px solid #332800; color: #886622; border-radius: 6px; padding: 10px 16px; font-size: 0.74rem; margin-bottom: 16px; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <h1>Portfolio Editor</h1>
  <input class="token-input" id="tokenInput" type="password" placeholder="GitHub Personal Access Token" />
  <button class="btn primary" onclick="loadPortfolio()">Load</button>
  <button class="btn green" id="saveBtn" onclick="saveAll()" disabled>Push to GitHub</button>
  <span id="status">Enter token and click Load</span>
</div>

<!-- APP -->
<div id="app">

  <!-- GRID VIEW -->
  <div id="grid-view">
    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">Portfolio 1</div>
      <div class="tab" onclick="switchTab(1)">Portfolio 2</div>
    </div>
    <div class="warn">Files over 25 MB cannot be uploaded via the GitHub API — compress large videos first.</div>
    <div class="sections-grid" id="sections-grid-0"></div>
    <div class="sections-grid" id="sections-grid-1" style="display:none"></div>
  </div>

  <!-- CANVAS EDITOR OVERLAY -->
  <div id="canvas-editor">
    <div id="canvas-header">
      <span class="back-btn" onclick="closeCanvasEditor()">←</span>
      <span class="canvas-title" id="canvas-title">Gallery</span>
      <span class="slide-info" id="slide-info"></span>
      <span class="zoom-display" id="zoom-display">100%</span>
      <button class="btn" onclick="resetCurrentSlide()">Reset</button>
    </div>

    <div id="canvas-area">
      <div id="canvas-media-wrap"></div>
      <div id="canvas-empty"><span class="big-plus">+</span><p>Drop or click to add</p></div>
    </div>

    <div id="filmstrip-wrap">
      <div id="filmstrip"></div>
    </div>
  </div>

</div>

<script>
const REPO   = 'daniellesasi/Portfolio';
const BRANCH = 'main';
const PORTS  = ['a1', 'a2'];
const N_SECTIONS = 7;
const BASE   = 'https://daniellesasi.github.io/Portfolio/';

let token = '', indexSha = '', currentHTML = '';
let activeTab = 0;

// sections[sectionId] = [ { src, type, posX, posY, scale, base64, filename, preview, deleted } ]
let sections = {};
let activeSection = null;
let activeSlideIdx = 0;

// ── AUTH / STATUS ──────────────────────────────────────────────────────────────
const getToken = () => {
  token = document.getElementById('tokenInput').value.trim() || localStorage.getItem('gh_token') || '';
  document.getElementById('tokenInput').value = token;
  if (token) localStorage.setItem('gh_token', token);
  return token;
};
const setStatus = (msg, cls = '') => { const el = document.getElementById('status'); el.textContent = msg; el.className = cls; };

// ── GITHUB API ─────────────────────────────────────────────────────────────────
const ghFetch = (path, opts = {}) => fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
  headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json', ...opts.headers }, ...opts
});

// ── LOAD ───────────────────────────────────────────────────────────────────────
async function loadPortfolio() {
  if (!getToken()) { setStatus('Enter your GitHub token first', 'err'); return; }
  setStatus('Loading…');
  try {
    const res = await ghFetch('index.html');
    if (!res.ok) throw new Error(res.status === 401 ? 'Invalid token' : 'Could not fetch index.html');
    const data = await res.json();
    indexSha = data.sha;
    currentHTML = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    parsePortfolio();
    renderGrid();
    document.getElementById('saveBtn').disabled = false;
    setStatus('Loaded ✓', 'ok');
  } catch(e) { setStatus('Error: ' + e.message, 'err'); }
}

function parsePortfolio() {
  sections = {};
  const doc = new DOMParser().parseFromString(currentHTML, 'text/html');
  PORTS.forEach(port => {
    for (let b = 1; b <= N_SECTIONS; b++) {
      const id = `${port}b${b}`;
      const sec = doc.getElementById(id);
      const slides = [];
      if (sec) {
        sec.querySelectorAll('img, video').forEach(el => {
          const style = el.getAttribute('style') || '';
          const pm = style.match(/object-position:\s*([\d.]+)%\s+([\d.]+)%/);
          const sm = style.match(/scale\(([\d.]+)\)/);
          slides.push({ src: el.getAttribute('src') || '', type: el.tagName.toLowerCase(), posX: pm ? +pm[1] : 50, posY: pm ? +pm[2] : 50, scale: sm ? +sm[1] : 1 });
        });
      }
      sections[id] = slides;
    }
  });
}

// ── GRID ───────────────────────────────────────────────────────────────────────
function renderGrid() {
  PORTS.forEach((port, pi) => {
    const grid = document.getElementById(`sections-grid-${pi}`);
    grid.innerHTML = '';
    for (let b = 1; b <= N_SECTIONS; b++) {
      const id = `${port}b${b}`;
      const slides = sections[id] || [];
      const first = slides.find(s => !s.deleted);
      const card = document.createElement('div');
      card.className = 'section-card';
      card.onclick = () => openCanvasEditor(id);
      const preview = first
        ? (first.type === 'video'
            ? `<video src="${first.preview || BASE + first.src}" muted autoplay loop playsinline></video>`
            : `<img src="${first.preview || BASE + first.src}">`)
        : '';
      const count = slides.filter(s => !s.deleted).length;
      card.innerHTML = `
        <div class="preview">
          ${preview}
          <span class="count-badge">${count} slide${count !== 1 ? 's' : ''}</span>
        </div>
        <div class="card-footer">
          <span class="card-label">Gallery ${b}</span>
          <span class="edit-hint">Click to edit →</span>
        </div>`;
      grid.appendChild(card);
    }
  });
}

function switchTab(i) {
  activeTab = i;
  document.querySelectorAll('.tab').forEach((t, ti) => t.classList.toggle('active', ti === i));
  document.querySelectorAll('.sections-grid').forEach((g, gi) => g.style.display = gi === i ? '' : 'none');
}

// ── CANVAS EDITOR ──────────────────────────────────────────────────────────────
function openCanvasEditor(sectionId) {
  activeSection = sectionId;
  activeSlideIdx = 0;
  const bNum = sectionId.match(/b(\d+)/)[1];
  document.getElementById('canvas-title').textContent = `Gallery ${bNum}`;
  document.getElementById('canvas-editor').classList.add('open');
  renderFilmstrip();
  showSlide(0);
}

function closeCanvasEditor() {
  document.getElementById('canvas-editor').classList.remove('open');
  renderGrid();
}

function renderFilmstrip() {
  const strip = document.getElementById('filmstrip');
  strip.innerHTML = '';
  const slides = sections[activeSection] || [];
  slides.forEach((slide, i) => {
    if (slide.deleted) return;
    strip.appendChild(buildThumb(slide, i));
  });
  const addThumb = document.createElement('div');
  addThumb.className = 'thumb-add';
  addThumb.innerHTML = '+';
  addThumb.onclick = () => triggerFilePicker();
  // Drop onto add thumb
  addThumb.addEventListener('dragover', e => { e.preventDefault(); addThumb.style.borderColor = '#fff'; });
  addThumb.addEventListener('dragleave', () => addThumb.style.borderColor = '');
  addThumb.addEventListener('drop', e => { e.preventDefault(); addThumb.style.borderColor = ''; handleFiles(e.dataTransfer.files); });
  strip.appendChild(addThumb);
}

function buildThumb(slide, idx) {
  const thumb = document.createElement('div');
  thumb.className = 'thumb' + (idx === activeSlideIdx ? ' active' : '');
  thumb.dataset.idx = idx;
  const src = slide.preview || (slide.src ? BASE + slide.src : '');
  if (src) {
    const el = document.createElement(slide.type);
    el.src = src;
    if (slide.type === 'video') { el.muted = true; el.autoplay = true; el.loop = true; }
    thumb.appendChild(el);
  }
  thumb.innerHTML += `<button class="thumb-del" onclick="deleteSlide(event,${idx})">✕</button><span class="thumb-idx">${idx + 1}</span>`;
  thumb.addEventListener('click', e => { if (!e.target.classList.contains('thumb-del')) showSlide(idx); });
  return thumb;
}

function showSlide(idx) {
  const slides = (sections[activeSection] || []).filter(s => !s.deleted);
  if (!slides.length) {
    document.getElementById('canvas-media-wrap').innerHTML = '';
    document.getElementById('canvas-empty').style.display = 'flex';
    document.getElementById('slide-info').textContent = 'No slides';
    return;
  }
  idx = Math.max(0, Math.min(slides.length - 1, idx));

  // Map to real index in sections array
  let realIdx = -1, count = 0;
  (sections[activeSection] || []).forEach((s, i) => { if (!s.deleted) { if (count === idx) realIdx = i; count++; } });
  activeSlideIdx = realIdx;

  const slide = sections[activeSection][realIdx];
  const src = slide.preview || (slide.src ? BASE + slide.src : '');
  const wrap = document.getElementById('canvas-media-wrap');
  wrap.innerHTML = '';
  document.getElementById('canvas-empty').style.display = 'none';

  if (src) {
    const el = document.createElement(slide.type);
    el.src = src;
    if (slide.type === 'video') { el.muted = true; el.autoplay = true; el.loop = true; el.playsInline = true; }
    el.style.objectPosition = `${slide.posX}% ${slide.posY}%`;
    el.style.transform = `scale(${slide.scale})`;
    wrap.appendChild(el);
  }

  document.getElementById('slide-info').textContent = `${idx + 1} / ${slides.length}`;
  document.getElementById('zoom-display').textContent = `${Math.round((slide.scale || 1) * 100)}%`;

  // Update filmstrip highlight
  document.querySelectorAll('.thumb').forEach((t, ti) => t.classList.toggle('active', +t.dataset.idx === realIdx));
}

function deleteSlide(e, idx) {
  e.stopPropagation();
  if (!confirm('Remove this slide?')) return;
  sections[activeSection][idx].deleted = true;
  const visIdx = sections[activeSection].slice(0, idx).filter(s => !s.deleted).length;
  renderFilmstrip();
  showSlide(Math.max(0, visIdx - 1));
}

function resetCurrentSlide() {
  const slide = sections[activeSection]?.[activeSlideIdx];
  if (!slide) return;
  slide.posX = 50; slide.posY = 50; slide.scale = 1; slide.modified = true;
  const el = document.querySelector('#canvas-media-wrap img, #canvas-media-wrap video');
  if (el) { el.style.objectPosition = '50% 50%'; el.style.transform = 'scale(1)'; }
  document.getElementById('zoom-display').textContent = '100%';
}

// ── PAN / ZOOM ─────────────────────────────────────────────────────────────────
let pan = { active: false, ox: 0, oy: 0 };
const canvasArea = document.getElementById('canvas-area');

canvasArea.addEventListener('mousedown', e => {
  if (e.target.closest('#canvas-empty')) return;
  pan.active = true; pan.ox = e.clientX; pan.oy = e.clientY;
  canvasArea.classList.add('grabbing');
});

document.addEventListener('mousemove', e => {
  if (!pan.active) return;
  const slide = sections[activeSection]?.[activeSlideIdx];
  if (!slide) return;
  const dx = e.clientX - pan.ox, dy = e.clientY - pan.oy;
  pan.ox = e.clientX; pan.oy = e.clientY;
  slide.posX = Math.max(0, Math.min(100, slide.posX - dx * 0.15));
  slide.posY = Math.max(0, Math.min(100, slide.posY - dy * 0.15));
  slide.modified = true;
  const el = document.querySelector('#canvas-media-wrap img, #canvas-media-wrap video');
  if (el) el.style.objectPosition = `${slide.posX.toFixed(1)}% ${slide.posY.toFixed(1)}%`;
});

document.addEventListener('mouseup', () => { pan.active = false; canvasArea.classList.remove('grabbing'); });

canvasArea.addEventListener('wheel', e => {
  e.preventDefault();
  const slide = sections[activeSection]?.[activeSlideIdx];
  if (!slide) return;
  slide.scale = Math.max(0.3, Math.min(5, slide.scale + (e.deltaY < 0 ? 0.04 : -0.04)));
  slide.modified = true;
  const el = document.querySelector('#canvas-media-wrap img, #canvas-media-wrap video');
  if (el) el.style.transform = `scale(${slide.scale.toFixed(3)})`;
  document.getElementById('zoom-display').textContent = `${Math.round(slide.scale * 100)}%`;
}, { passive: false });

// Drop files onto canvas
canvasArea.addEventListener('dragover', e => { e.preventDefault(); canvasArea.classList.add('drag-over'); });
canvasArea.addEventListener('dragleave', e => { if (!canvasArea.contains(e.relatedTarget)) canvasArea.classList.remove('drag-over'); });
canvasArea.addEventListener('drop', e => { e.preventDefault(); canvasArea.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
canvasArea.querySelector('#canvas-empty').addEventListener('click', () => triggerFilePicker());

// ── FILE HANDLING ──────────────────────────────────────────────────────────────
function triggerFilePicker(multi = true) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*,video/*'; input.multiple = multi;
  input.onchange = () => handleFiles(input.files);
  input.click();
}

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (file.size > 25 * 1024 * 1024) { setStatus(`${file.name} is too large (${(file.size/1024/1024).toFixed(0)}MB). Max 25MB.`, 'err'); return; }
    const ext = file.name.split('.').pop().toLowerCase();
    const slides = sections[activeSection];
    const nextC = slides.length + 1;
    const filename = `${activeSection}c${nextC}.${ext}`;
    const isVideo = file.type.startsWith('video');
    const reader = new FileReader();
    reader.onload = ev => {
      const slide = { src: '', type: isVideo ? 'video' : 'img', posX: 50, posY: 50, scale: 1, base64: ev.target.result.split(',')[1], filename, preview: ev.target.result, modified: true };
      sections[activeSection].push(slide);
      renderFilmstrip();
      showSlide(sections[activeSection].filter(s => !s.deleted).length - 1);
      setStatus(`${filename} added`, 'ok');
    };
    reader.readAsDataURL(file);
  });
}

// ── SAVE ───────────────────────────────────────────────────────────────────────
async function saveAll() {
  if (!getToken()) { setStatus('No token', 'err'); return; }
  document.getElementById('saveBtn').disabled = true;

  const uploads = [];
  Object.values(sections).forEach(slides => slides.forEach(s => { if (s.base64) uploads.push(s); }));

  let done = 0;
  for (const s of uploads) {
    setStatus(`Uploading ${s.filename} (${++done}/${uploads.length})…`);
    try {
      const ex = await ghFetch(s.filename);
      const sha = ex.ok ? (await ex.json()).sha : undefined;
      const body = { message: `Upload ${s.filename}`, content: s.base64, branch: BRANCH };
      if (sha) body.sha = sha;
      const res = await ghFetch(s.filename, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) throw new Error(await res.text());
      s.src = s.filename; delete s.base64;
    } catch(e) { setStatus('Upload failed: ' + e.message, 'err'); document.getElementById('saveBtn').disabled = false; return; }
  }

  setStatus('Updating index.html…');
  try {
    await pushIndexHTML();
    setStatus(`✓ Saved ${uploads.length} file(s)`, 'ok');
  } catch(e) { setStatus('index.html update failed: ' + e.message, 'err'); }
  document.getElementById('saveBtn').disabled = false;
  renderGrid();
}

async function pushIndexHTML() {
  const parser = new DOMParser();
  const doc = parser.parseFromString(currentHTML, 'text/html');

  Object.entries(sections).forEach(([id, slides]) => {
    const section = doc.getElementById(id);
    if (!section) return;
    const gallery = section.querySelector('.horizontal-gallery');
    if (!gallery) return;
    gallery.innerHTML = '\n                    ';
    slides.filter(s => !s.deleted).forEach(s => {
      const el = doc.createElement(s.type);
      el.setAttribute('src', s.filename || s.src);
      const style = `object-position: ${s.posX.toFixed(1)}% ${s.posY.toFixed(1)}%; transform: scale(${s.scale.toFixed(3)});`;
      el.setAttribute('style', style);
      if (s.type === 'video') { el.setAttribute('autoplay',''); el.setAttribute('loop',''); el.setAttribute('muted',''); el.setAttribute('playsinline',''); }
      else { el.setAttribute('loading','lazy'); el.setAttribute('alt',''); }
      gallery.appendChild(el);
      gallery.appendChild(doc.createTextNode('\n                    '));
    });
  });

  const newHTML = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
  const encoded = btoa(unescape(encodeURIComponent(newHTML)));
  const res = await ghFetch('index.html', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: 'Update portfolio', content: encoded, sha: indexSha, branch: BRANCH }) });
  if (!res.ok) throw new Error(await res.text());
  const data = await res.json();
  indexSha = data.content.sha;
  currentHTML = newHTML;
}

window.onload = () => { const t = localStorage.getItem('gh_token'); if (t) document.getElementById('tokenInput').value = t; };
</script>
</body>
</html>
