<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Editor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#5a5a5a; color:#fff; height:100vh; overflow:hidden; user-select:none; }

/* HEADER */
#hdr { height:50px; background:#4a4a4a; border-bottom:1px solid #3a3a3a; display:flex; align-items:center; gap:10px; padding:0 20px; flex-shrink:0; }
#hdr h1 { font-size:.68rem; letter-spacing:3px; text-transform:uppercase; color:#888; flex:1; }
.inp { background:#555; border:1px solid #444; color:#fff; padding:6px 12px; border-radius:5px; font-size:.76rem; width:250px; }
.inp::placeholder { color:#888; }
.btn { background:#666; color:#ddd; border:1px solid #555; padding:6px 14px; border-radius:5px; font-size:.76rem; cursor:pointer; }
.btn:hover { background:#777; color:#fff; }
.btn.w { background:#fff; color:#000; border-color:#fff; font-weight:700; }
.btn.w:hover { background:#ddd; }
.btn.g { background:#00bb44; color:#000; border-color:#00bb44; font-weight:700; }
.btn.g:hover { background:#009933; }
.btn:disabled { opacity:.2; pointer-events:none; }
#st { font-size:.72rem; color:#aaa; }
#st.ok { color:#00ee66; }
#st.er { color:#f66; }

/* GRID */
#app { height:calc(100vh - 50px); display:flex; flex-direction:column; }
#grid-view { flex:1; overflow-y:auto; padding:20px 24px 40px; }
.tabs { display:flex; gap:8px; margin-bottom:18px; }
.tab { padding:5px 16px; background:#555; border:1px solid #666; border-radius:20px; cursor:pointer; font-size:.74rem; color:#aaa; }
.tab.active { background:#fff; color:#000; border-color:#fff; }
.sg { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
.sc { background:#4a4a4a; border:1px solid #555; border-radius:9px; overflow:hidden; cursor:pointer; transition:border-color .2s,transform .15s; }
.sc:hover { border-color:#888; transform:scale(1.015); }
.sc .prev { height:150px; background:#3a3a3a; position:relative; overflow:hidden; }
.sc .prev img,.sc .prev video { width:100%; height:100%; object-fit:cover; pointer-events:none; }
.sc .prev .badge { position:absolute; bottom:7px; right:8px; background:rgba(0,0,0,.6); padding:2px 8px; border-radius:9px; font-size:.6rem; color:#ccc; }
.sc .foot { padding:9px 13px; display:flex; justify-content:space-between; align-items:center; }
.sc .lbl { font-size:.68rem; letter-spacing:2px; text-transform:uppercase; color:#bbb; }
.sc .hint { font-size:.64rem; color:#888; }
.sc:hover .hint { color:#ddd; }

/* CANVAS EDITOR */
#ce { position:fixed; inset:0; background:#5a5a5a; z-index:100; display:none; flex-direction:column; }
#ce.open { display:flex; }
#ce-hdr { height:50px; background:#4a4a4a; border-bottom:1px solid #3a3a3a; display:flex; align-items:center; gap:12px; padding:0 18px; flex-shrink:0; }
.back { font-size:1rem; cursor:pointer; color:#aaa; padding:4px 8px; border-radius:4px; }
.back:hover { color:#fff; background:#666; }
#ce-title { font-size:.68rem; letter-spacing:3px; text-transform:uppercase; color:#bbb; flex:1; }
#slide-lbl { font-size:.7rem; color:#aaa; }
.sep { width:1px; height:24px; background:#666; }

/* MAIN CANVAS */
#ce-body { flex:1; display:flex; overflow:hidden; }
#layer-panel { width:180px; background:#4a4a4a; border-right:1px solid #3a3a3a; display:flex; flex-direction:column; flex-shrink:0; }
#layer-panel h2 { font-size:.62rem; letter-spacing:2px; text-transform:uppercase; color:#aaa; padding:12px 14px 8px; border-bottom:1px solid #3a3a3a; }
#layer-list { flex:1; overflow-y:auto; padding:6px; }
.layer-item { display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:5px; cursor:pointer; font-size:.72rem; color:#bbb; margin-bottom:2px; }
.layer-item:hover { background:#555; color:#fff; }
.layer-item.sel { background:#2a3a2a; color:#fff; border:1px solid #00bb44; }
.layer-item .li-thumb { width:32px; height:22px; border-radius:3px; overflow:hidden; flex-shrink:0; background:#666; }
.layer-item .li-thumb img,.layer-item .li-thumb video { width:100%; height:100%; object-fit:cover; }
.layer-item .li-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:.66rem; }
.layer-item .li-del { font-size:.7rem; color:#888; cursor:pointer; padding:2px 4px; border-radius:3px; }
.layer-item .li-del:hover { color:#f55; background:#3a1515; }
#add-layer-btn { margin:8px; padding:7px; background:#555; border:1px dashed #777; border-radius:5px; text-align:center; cursor:pointer; font-size:.68rem; color:#bbb; }
#add-layer-btn:hover { border-color:#aaa; color:#fff; }

#canvas-wrap { flex:1; position:relative; overflow:hidden; background:#666; }
#canvas { position:absolute; background:#000; overflow:hidden; cursor:default; }
#canvas.move-cursor { cursor:move; }
#canvas.crosshair { cursor:crosshair; }
#canvas.bg-white { background:#fff; }

/* SELECTION OVERLAY */
#sel-box { position:absolute; pointer-events:none; z-index:1000; display:none; }
#sel-box .sel-border { position:absolute; inset:0; border:2px solid #00cc66; border-radius:1px; }
.handle { position:absolute; width:10px; height:10px; background:#fff; border:1.5px solid #00cc66; border-radius:2px; pointer-events:all; cursor:pointer; z-index:1001; }
.handle.nw { top:-5px; left:-5px; cursor:nw-resize; }
.handle.ne { top:-5px; right:-5px; cursor:ne-resize; }
.handle.se { bottom:-5px; right:-5px; cursor:se-resize; }
.handle.sw { bottom:-5px; left:-5px; cursor:sw-resize; }
.rot-handle { position:absolute; width:14px; height:14px; background:#00cc66; border-radius:50%; top:-28px; left:50%; transform:translateX(-50%); pointer-events:all; cursor:grab; z-index:1001; }
.rot-line { position:absolute; width:1px; height:20px; background:#00cc66; top:-20px; left:50%; transform:translateX(-50%); }
.sel-drag { position:absolute; inset:0; pointer-events:all; cursor:move; }

/* FILMSTRIP */
#fs-wrap { height:108px; background:#4a4a4a; border-top:1px solid #3a3a3a; display:flex; align-items:center; flex-shrink:0; overflow:hidden; }
#fs { display:flex; gap:8px; padding:10px 14px; overflow-x:auto; height:100%; align-items:center; flex:1; }
#fs::-webkit-scrollbar { height:3px; }
#fs::-webkit-scrollbar-thumb { background:#777; border-radius:2px; }
.th { width:120px; height:80px; flex-shrink:0; border-radius:6px; overflow:hidden; cursor:grab; border:2px solid #666; position:relative; background:#555; transition:border-color .15s, opacity .15s; }
.th:hover { border-color:#999; }
.th.act { border-color:#fff; }
.th.drag-over { border-color:#00cc66; border-style:dashed; }
.th.dragging { opacity:.3; cursor:grabbing; }
.th canvas,.th img,.th video { width:100%; height:100%; object-fit:cover; pointer-events:none; display:block; }
.th .th-del { position:absolute; top:3px; right:3px; background:rgba(0,0,0,.75); border:none; color:#fff; width:18px; height:18px; border-radius:3px; font-size:.6rem; cursor:pointer; display:none; align-items:center; justify-content:center; z-index:2; }
.th:hover .th-del { display:flex; }
.th .th-del:hover { background:rgba(200,30,30,.8); }
.th-add { width:120px; height:80px; flex-shrink:0; border-radius:6px; border:2px dashed #777; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#aaa; font-size:1.2rem; }
.th-add:hover { border-color:#bbb; color:#fff; }

.warn { background:#4a3a00; border:1px solid #6a5000; color:#ffd060; border-radius:6px; padding:9px 14px; font-size:.72rem; margin-bottom:14px; }
</style>
</head>
<body>

<div id="hdr">
  <h1>Portfolio Editor</h1>
  <input class="inp" id="tok" type="password" placeholder="GitHub Personal Access Token">
  <button class="btn w" onclick="load()">Load</button>
  <button class="btn g" id="saveBtn" onclick="saveAll()" disabled>Push to GitHub</button>
  <span id="st">Enter token and click Load</span>
</div>

<div id="app">
  <div id="grid-view">
    <div class="tabs"><div class="tab active" onclick="switchTab(0)">Portfolio 1</div><div class="tab" onclick="switchTab(1)">Portfolio 2</div></div>
    <div class="warn">Files over 25 MB can't be uploaded via GitHub API — compress large videos first.</div>
    <div class="sg" id="sg0"></div>
    <div class="sg" id="sg1" style="display:none"></div>
  </div>

  <div id="ce">
    <div id="ce-hdr">
      <span class="back" onclick="closeEditor()">←</span>
      <span id="ce-title">Gallery</span>
      <span id="slide-lbl"></span>
      <span class="sep"></span>
      <button class="btn" id="bgToggle" onclick="toggleCanvasBg()" title="Toggle canvas background">⬛ Black</button>
      <button class="btn" onclick="resetSel()">Reset layer</button>
      <button class="btn" onclick="addSlide()">+ Slide</button>
    </div>
    <div id="ce-body">
      <div id="layer-panel">
        <h2>Layers</h2>
        <div id="layer-list"></div>
        <div id="add-layer-btn" onclick="pickFiles()">+ Add image / video</div>
      </div>
      <div id="canvas-wrap">
        <div id="canvas">
          <div id="sel-box">
            <div class="rot-line"></div>
            <div class="rot-handle" id="rot-h"></div>
            <div class="sel-border"></div>
            <div class="sel-drag" id="sel-drag"></div>
            <div class="handle nw" data-h="nw"></div>
            <div class="handle ne" data-h="ne"></div>
            <div class="handle se" data-h="se"></div>
            <div class="handle sw" data-h="sw"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="fs-wrap"><div id="fs"></div></div>
  </div>
</div>

<script>
const REPO='daniellesasi/Portfolio', BRANCH='main', BASE='https://daniellesasi.github.io/Portfolio/';
const PORTS=['a1','a2'], NB=7;

let token='', idxSha='', idxHTML='';
// sections[id] = [ { layers:[ {id,type,src,preview,b64,filename,x,y,w,h,rot,z,fit} ] } ]
let sections={};
let activeSec=null, activeSlide=0, selId=null;
let drag=null; // {type:'move'|'resize'|'rotate', handle, sx,sy, ox,oy,ow,oh,orot}

const $ = id => document.getElementById(id);
const tok = () => { token=$('tok').value.trim()||localStorage.getItem('gh_t')||''; $('tok').value=token; if(token)localStorage.setItem('gh_t',token); return token; };
const st = (m,c='') => { $('st').textContent=m; $('st').className=c; };
const gh = (p,o={}) => { const {headers:xh={},...rest}=o; return fetch(`https://api.github.com/repos/${REPO}/contents/${p}`,{...rest,headers:{Authorization:`token ${tok()}`,Accept:'application/vnd.github.v3+json',...xh}}); };

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function load(){
  if(!tok()){st('Enter token','er');return;}
  st('Loading…');
  try{
    const r=await gh('index.html'); if(!r.ok)throw new Error(r.status===401?'Invalid token':'Fetch failed');
    const d=await r.json(); idxSha=d.sha;
    idxHTML=decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))));
    parseHTML(); renderGrid(); $('saveBtn').disabled=false; st('Loaded ✓','ok');
  }catch(e){st('Error: '+e.message,'er');}
}

function parseHTML(){
  sections={};
  const doc=new DOMParser().parseFromString(idxHTML,'text/html');
  PORTS.forEach(port=>{
    for(let b=1;b<=NB;b++){
      const id=`${port}b${b}`, sec=doc.getElementById(id), slides=[];
      if(sec){
        // New structure: .canvas-frame elements
        sec.querySelectorAll('.canvas-frame').forEach(frame=>{
          const layers=[];
          const bg=frame.classList.contains('bg-white')?'#fff':'#000';
          frame.querySelectorAll('img,video').forEach((el,li)=>{
            const s=el.getAttribute('style')||'';
            const lx=parseFloat((s.match(/left:([\d.]+)%/)||[,0])[1]);
            const ly=parseFloat((s.match(/top:([\d.]+)%/)||[,0])[1]);
            const lw=parseFloat((s.match(/width:([\d.]+)%/)||[,100])[1]);
            const lh=parseFloat((s.match(/height:([\d.]+)%/)||[,100])[1]);
            const lr=parseFloat((s.match(/rotate\(([-\d.]+)deg\)/)||[,0])[1]);
            const lz=parseInt((s.match(/z-index:([\d]+)/)||[,li+1])[1]);
            layers.push({id:`l${Date.now()+li}`,type:el.tagName.toLowerCase(),src:el.getAttribute('src')||'',x:lx,y:ly,w:lw,h:lh,rot:lr,z:lz,fit:'cover'});
          });
          slides.push({layers,bg});
        });
        // Legacy: direct img/video
        if(!slides.length){
          sec.querySelectorAll('.horizontal-gallery > img, .horizontal-gallery > video').forEach(el=>{
            slides.push({layers:[{id:`l${Date.now()+Math.random()}`,type:el.tagName.toLowerCase(),src:el.getAttribute('src')||'',x:0,y:0,w:100,h:100,rot:0,z:1,fit:'cover'}]});
          });
        }
      }
      if(!slides.length) slides.push({layers:[]});
      sections[id]=slides;
    }
  });
}

// ── GRID ─────────────────────────────────────────────────────────────────────
function renderGrid(){
  [0,1].forEach(pi=>{
    const g=$(`sg${pi}`); g.innerHTML='';
    for(let b=1;b<=NB;b++){
      const id=`${PORTS[pi]}b${b}`, slides=sections[id]||[];
      const first=slides[0]?.layers?.find(l=>l.src||l.preview);
      const el=document.createElement('div'); el.className='sc'; el.onclick=()=>openEditor(id);
      const src=first?(first.preview||BASE+first.src):'';
      const tag=first?.type||'img';
      const prev=src?`<${tag} src="${src}" ${tag==='video'?'muted autoplay loop playsinline':''}></${tag}>` :'';
      const count=slides.reduce((a,s)=>a+(s.layers?.length||0),0);
      el.innerHTML=`<div class="prev">${prev}<span class="badge">${slides.length} slide${slides.length!==1?'s':''} · ${count} layer${count!==1?'s':''}</span></div><div class="foot"><span class="lbl">Gallery ${b}</span><span class="hint">Click to edit →</span></div>`;
      g.appendChild(el);
    }
  });
}
function switchTab(i){
  document.querySelectorAll('.tab').forEach((t,ti)=>t.classList.toggle('active',ti===i));
  $('sg0').style.display=i===0?'':'none'; $('sg1').style.display=i===1?'':'none';
}

// ── CANVAS EDITOR ─────────────────────────────────────────────────────────────
function openEditor(id){
  activeSec=id; activeSlide=0; selId=null;
  const b=id.match(/b(\d+)/)[1];
  $('ce-title').textContent=`Gallery ${b}`;
  $('ce').classList.add('open');
  positionCanvas();
  renderFilmstrip(); showSlide(0); renderLayers();
}
function closeEditor(){ $('ce').classList.remove('open'); hideSel(); renderGrid(); }

function positionCanvas(){
  const wrap=$('canvas-wrap'), c=$('canvas');
  const ww=wrap.clientWidth, wh=wrap.clientHeight;
  const aspect=16/9;
  let cw,ch;
  if(ww/wh>aspect){ch=wh*.92;cw=ch*aspect;}else{cw=ww*.92;ch=cw/aspect;}
  cw=Math.floor(cw); ch=Math.floor(ch);
  c.style.width=cw+'px'; c.style.height=ch+'px';
  c.style.left=Math.floor((ww-cw)/2)+'px'; c.style.top=Math.floor((wh-ch)/2)+'px';
}

function renderFilmstrip(){
  const fs=$('fs'); fs.innerHTML='';
  const slides=sections[activeSec]||[];
  slides.forEach((slide,i)=>{
    const th=document.createElement('div'); th.className='th'+(i===activeSlide?' act':''); th.dataset.i=i;
    th.draggable=true;
    const first=slide.layers?.find(l=>l.src||l.preview);
    if(first){const src=first.preview||BASE+first.src; const el=document.createElement(first.type); el.src=src; if(first.type==='video'){el.muted=true;el.autoplay=true;el.loop=true;} th.appendChild(el);}
    th.innerHTML+=`<button class="th-del" onclick="delSlide(event,${i})">✕</button>`;
    th.onclick=e=>{if(!e.target.classList.contains('th-del'))showSlide(i);};
    // drag-to-reorder
    th.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',i);th.classList.add('dragging');});
    th.addEventListener('dragend',()=>th.classList.remove('dragging'));
    th.addEventListener('dragover',e=>{e.preventDefault();th.classList.add('drag-over');});
    th.addEventListener('dragleave',()=>th.classList.remove('drag-over'));
    th.addEventListener('drop',e=>{
      e.preventDefault(); th.classList.remove('drag-over');
      const from=parseInt(e.dataTransfer.getData('text/plain')), to=i;
      if(from===to)return;
      const arr=sections[activeSec];
      arr.splice(to,0,arr.splice(from,1)[0]);
      renderFilmstrip(); showSlide(to);
    });
    fs.appendChild(th);
  });
  const add=document.createElement('div'); add.className='th-add'; add.innerHTML='+';
  add.onclick=addSlide; fs.appendChild(add);
}

function showSlide(i){
  const slides=sections[activeSec]||[];
  i=Math.max(0,Math.min(slides.length-1,i));
  activeSlide=i; selId=null; hideSel();
  $('slide-lbl').textContent=`Slide ${i+1} / ${slides.length}`;
  const c=$('canvas'), btn=$('bgToggle');
  const slide=slides[i];
  const isWhite=(slide?.bg||'#000')==='#fff';
  c.classList.toggle('bg-white',isWhite);
  btn.textContent=isWhite?'⬜ White':'⬛ Black';
  // Remove all media layers (keep sel-box)
  Array.from(c.querySelectorAll('[data-lid]')).forEach(el=>el.remove());
  if(slide?.layers) slide.layers.sort((a,b)=>a.z-b.z).forEach(layer=>c.appendChild(buildLayerEl(layer)));
  // update filmstrip highlight
  document.querySelectorAll('.th').forEach((t,ti)=>t.classList.toggle('act',ti===i));
}

function buildLayerEl(layer){
  const wrap=document.createElement('div');
  wrap.dataset.lid=layer.id;
  wrap.style.cssText=`position:absolute;left:${layer.x}%;top:${layer.y}%;width:${layer.w}%;height:${layer.h}%;transform:rotate(${layer.rot}deg);z-index:${layer.z};overflow:hidden;box-sizing:border-box;`;
  if(layer.id===selId) wrap.style.outline='2px solid #00cc66';
  const media=document.createElement(layer.type);
  const src=layer.preview||layer.src;
  if(src) media.src=src.startsWith('data:')?src:BASE+src;
  media.style.cssText=`width:100%;height:100%;object-fit:${layer.fit||'cover'};pointer-events:none;display:block;`;
  if(layer.type==='video'){media.muted=true;media.autoplay=true;media.loop=true;}
  wrap.appendChild(media);
  wrap.addEventListener('mousedown',e=>{e.stopPropagation();selectLayer(layer.id,e);});
  return wrap;
}

function renderLayers(){
  const list=$('layer-list'); list.innerHTML='';
  const slide=sections[activeSec]?.[activeSlide];
  if(!slide?.layers?.length){list.innerHTML='<div style="padding:12px;font-size:.68rem;color:#2a2a2a;text-align:center;">No layers yet</div>';return;}
  [...slide.layers].reverse().forEach(layer=>{
    const item=document.createElement('div'); item.className='layer-item'+(layer.id===selId?' sel':''); item.dataset.lid=layer.id;
    const src=layer.preview||layer.src;
    const thumbHTML=src?`<div class="li-thumb"><${layer.type} src="${src.startsWith('data:')?src:BASE+src}" ${layer.type==='video'?'muted autoplay loop':''}></${layer.type}></div>`:'<div class="li-thumb"></div>';
    item.innerHTML=`${thumbHTML}<span class="li-name">${layer.filename||layer.src||'Layer'}</span><span class="li-del" onclick="delLayer(event,'${layer.id}')">✕</span>`;
    item.onclick=e=>{if(!e.target.classList.contains('li-del'))selectLayerById(layer.id);};
    list.appendChild(item);
  });
}

// ── SELECTION & TRANSFORM ─────────────────────────────────────────────────────
function selectLayer(lid,e){
  selId=lid; renderLayers();
  const c=$('canvas'), wrap=c.querySelector(`[data-lid="${lid}"]`);
  if(!wrap){hideSel();return;}
  const layer=getLayer(lid);
  updateSelBox(layer);
  $('sel-box').style.display='block';
}
function selectLayerById(lid){ selId=lid; renderLayers(); const layer=getLayer(lid); if(layer)updateSelBox(layer); $('sel-box').style.display=selId?'block':'none'; showSlide(activeSlide); }

function getLayer(lid){ return sections[activeSec]?.[activeSlide]?.layers?.find(l=>l.id===lid); }

function updateSelBox(layer){
  const c=$('canvas'), sb=$('sel-box');
  const cw=c.clientWidth, ch=c.clientHeight;
  const px=layer.x/100*cw, py=layer.y/100*ch;
  const pw=layer.w/100*cw, ph=layer.h/100*ch;
  sb.style.cssText=`left:${px}px;top:${py}px;width:${pw}px;height:${ph}px;transform:rotate(${layer.rot}deg);transform-origin:top left;display:block;position:absolute;z-index:1000;`;
}

function hideSel(){ $('sel-box').style.display='none'; selId=null; }

// Drag interactions
const canvas=$('canvas');
canvas.addEventListener('mousedown',e=>{
  if(e.target===canvas||e.target.id==='canvas'){hideSel();renderLayers();return;}
  if(e.target.id==='sel-drag'||e.target.dataset.lid){
    const layer=getLayer(selId); if(!layer)return;
    drag={type:'move',sx:e.clientX,sy:e.clientY,ox:layer.x,oy:layer.y}; e.preventDefault();
  }
});

document.querySelectorAll('.handle').forEach(h=>{
  h.addEventListener('mousedown',e=>{
    const layer=getLayer(selId); if(!layer)return;
    drag={type:'resize',handle:h.dataset.h,sx:e.clientX,sy:e.clientY,ox:layer.x,oy:layer.y,ow:layer.w,oh:layer.h}; e.preventDefault(); e.stopPropagation();
  });
});

$('rot-h').addEventListener('mousedown',e=>{
  const layer=getLayer(selId); if(!layer)return;
  const c=canvas, sb=$('sel-box');
  const cr=c.getBoundingClientRect(), sr=sb.getBoundingClientRect();
  const cx=(sr.left+sr.right)/2, cy=(sr.top+sr.bottom)/2;
  drag={type:'rotate',cx,cy,orot:layer.rot}; e.preventDefault(); e.stopPropagation();
});

document.addEventListener('mousemove',e=>{
  if(!drag) return;
  const layer=getLayer(selId); if(!layer)return;
  const c=canvas, cw=c.clientWidth, ch=c.clientHeight;
  const cr=c.getBoundingClientRect();
  const dx=e.clientX-drag.sx, dy=e.clientY-drag.sy;
  const dxp=dx/cw*100, dyp=dy/ch*100;

  if(drag.type==='move'){
    layer.x=Math.round((drag.ox+dxp)*10)/10;
    layer.y=Math.round((drag.oy+dyp)*10)/10;
  } else if(drag.type==='resize'){
    const h=drag.handle;
    if(h==='se'){layer.w=Math.max(5,Math.round((drag.ow+dxp)*10)/10);layer.h=Math.max(5,Math.round((drag.oh+dyp)*10)/10);}
    else if(h==='sw'){const nw=Math.max(5,drag.ow-dxp);layer.x=drag.ox+(drag.ow-nw);layer.w=nw;layer.h=Math.max(5,Math.round((drag.oh+dyp)*10)/10);}
    else if(h==='ne'){layer.w=Math.max(5,Math.round((drag.ow+dxp)*10)/10);const nh=Math.max(5,drag.oh-dyp);layer.y=drag.oy+(drag.oh-nh);layer.h=nh;}
    else if(h==='nw'){const nw=Math.max(5,drag.ow-dxp);layer.x=drag.ox+(drag.ow-nw);layer.w=nw;const nh=Math.max(5,drag.oh-dyp);layer.y=drag.oy+(drag.oh-nh);layer.h=nh;}
  } else if(drag.type==='rotate'){
    const angle=Math.atan2(e.clientY-drag.cy,e.clientX-drag.cx)*180/Math.PI+90;
    layer.rot=Math.round(angle);
  }

  // Update DOM without full re-render
  const wrap=canvas.querySelector(`[data-lid="${selId}"]`);
  if(wrap) wrap.style.cssText=`position:absolute;left:${layer.x}%;top:${layer.y}%;width:${layer.w}%;height:${layer.h}%;transform:rotate(${layer.rot}deg);z-index:${layer.z};overflow:hidden;box-sizing:border-box;`;
  updateSelBox(layer);
});

document.addEventListener('mouseup',()=>drag=null);

// Drop files onto canvas
canvas.addEventListener('dragover',e=>e.preventDefault());
canvas.addEventListener('drop',e=>{e.preventDefault();addFilesToSlide(e.dataTransfer.files);});

function resetSel(){
  const layer=getLayer(selId); if(!layer)return;
  layer.x=0;layer.y=0;layer.w=100;layer.h=100;layer.rot=0;
  showSlide(activeSlide); updateSelBox(layer);
}

// ── FILE / LAYER MANAGEMENT ───────────────────────────────────────────────────
function pickFiles(){ const i=document.createElement('input'); i.type='file'; i.accept='image/*,video/*'; i.multiple=true; i.onchange=()=>addFilesToSlide(i.files); i.click(); }

function addFilesToSlide(files){
  const slide=sections[activeSec]?.[activeSlide]; if(!slide)return;
  const slides=sections[activeSec];
  let cIdx=1;
  slides.forEach(sl=>sl.layers.forEach(l=>{const m=(l.filename||l.src||'').match(/c(\d+)\./);if(m)cIdx=Math.max(cIdx,+m[1]+1);}));
  Array.from(files).forEach(file=>{
    if(file.size>25*1024*1024){st(`${file.name} too large (max 25MB)`,'er');return;}
    const ext=file.name.split('.').pop().toLowerCase();
    const fname=`${activeSec}c${cIdx++}.${ext}`;
    const isVid=file.type.startsWith('video');
    const reader=new FileReader();
    reader.onload=ev=>{
      const layer={id:`l${Date.now()}`,type:isVid?'video':'img',src:'',preview:ev.target.result,b64:ev.target.result.split(',')[1],filename:fname,x:10,y:10,w:80,h:80,rot:0,z:(slide.layers.length||0)+1,fit:'cover'};
      slide.layers.push(layer);
      showSlide(activeSlide); renderLayers();
      selectLayerById(layer.id);
      st(`${fname} added`,'ok');
    };
    reader.readAsDataURL(file);
  });
}

function delLayer(e,lid){
  e.stopPropagation();
  const slide=sections[activeSec]?.[activeSlide]; if(!slide)return;
  slide.layers=slide.layers.filter(l=>l.id!==lid);
  if(selId===lid){hideSel();}
  showSlide(activeSlide); renderLayers();
}

function addSlide(){
  sections[activeSec].push({layers:[]});
  renderFilmstrip(); showSlide(sections[activeSec].length-1); renderLayers();
}

function delSlide(e,i){
  e.stopPropagation();
  if(sections[activeSec].length<=1)return;
  if(!confirm('Delete this slide?'))return;
  sections[activeSec].splice(i,1);
  renderFilmstrip(); showSlide(Math.min(i,sections[activeSec].length-1)); renderLayers();
}

// ── SAVE ─────────────────────────────────────────────────────────────────────
async function saveAll(){
  if(!tok()){st('No token','er');return;}
  $('saveBtn').disabled=true;
  // Collect all layers with b64
  const uploads=[]; Object.values(sections).forEach(slides=>slides.forEach(sl=>sl.layers.forEach(l=>{if(l.b64)uploads.push(l);})));
  let done=0;
  for(const l of uploads){
    st(`Uploading ${l.filename} (${++done}/${uploads.length})…`);
    try{
      const ex=await gh(l.filename); const sha=ex.ok?(await ex.json()).sha:undefined;
      const body={message:`Upload ${l.filename}`,content:l.b64,branch:BRANCH}; if(sha)body.sha=sha;
      const res=await gh(l.filename,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!res.ok)throw new Error(await res.text());
      l.src=l.filename; delete l.b64;
    }catch(e){st('Upload failed: '+e.message,'er');$('saveBtn').disabled=false;return;}
  }
  st('Updating index.html…');
  try{ await pushHTML(); st(`✓ ${done} file(s) saved`,'ok');}
  catch(e){st('index.html failed: '+e.message,'er');}
  $('saveBtn').disabled=false; renderGrid();
}

function buildHTML(){
  let html=idxHTML;
  Object.entries(sections).forEach(([id,slides])=>{
    let galContent='';
    slides.forEach(slide=>{
      if(!slide.layers?.length)return;
      const bgClass=slide.bg==='#fff'?' bg-white':'';
      let frame=`<div class="canvas-frame${bgClass}">`;
      slide.layers.sort((a,b)=>a.z-b.z).forEach(layer=>{
        const src=layer.filename||layer.src;
        const style=`position:absolute;left:${layer.x.toFixed(1)}%;top:${layer.y.toFixed(1)}%;width:${layer.w.toFixed(1)}%;height:${layer.h.toFixed(1)}%;transform:rotate(${layer.rot}deg);z-index:${layer.z};object-fit:${layer.fit||'cover'};`;
        if(layer.type==='video') frame+=`<video src="${src}" style="${style}" autoplay loop muted playsinline></video>`;
        else frame+=`<img src="${src}" style="${style}" loading="lazy" alt="">`;
      });
      frame+='</div>\n                    ';
      galContent+=frame;
    });
    html=html.replace(
      new RegExp(`(<section[^>]+id="${id}"[\\s\\S]*?<div[^>]+class="horizontal-gallery"[^>]*>)[\\s\\S]*?(</div>\\s*</section>)`),
      `$1\n                    ${galContent}$2`
    );
  });
  return html;
}

async function pushHTML(){
  const html=buildHTML();
  const enc=btoa(unescape(encodeURIComponent(html)));
  let sha=idxSha;
  // If sha is stale (conflict), fetch fresh sha and retry once
  let res=await gh('index.html',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'Update portfolio',content:enc,sha,branch:BRANCH})});
  if(res.status===409||res.status===422){
    st('Conflict — fetching latest sha…');
    const fresh=await gh('index.html');
    if(!fresh.ok) throw new Error('Could not refresh sha');
    sha=(await fresh.json()).sha;
    res=await gh('index.html',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'Update portfolio',content:enc,sha,branch:BRANCH})});
  }
  if(!res.ok) throw new Error(await res.text());
  const d=await res.json(); idxSha=d.content.sha; idxHTML=html;
}

function toggleCanvasBg(){
  const c=$('canvas'), btn=$('bgToggle');
  const isWhite=c.classList.toggle('bg-white');
  btn.textContent=isWhite?'⬜ White':'⬛ Black';
  const slide=sections[activeSec]?.[activeSlide]; if(slide) slide.bg=isWhite?'#fff':'#000';
}

window.addEventListener('resize',()=>{ positionCanvas(); if(selId){const l=getLayer(selId);if(l)updateSelBox(l);} });
window.onload=()=>{ const t=localStorage.getItem('gh_t'); if(t)$('tok').value=t; };
</script>
